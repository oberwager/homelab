# --- ntfy-alertmanager bridge ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-alertmanager-config
  namespace: monitoring
data:
  config: |
    http-address :8080
    log-level info
    alert-mode single

    labels {
      order "severity"
      severity "critical" {
        priority 5
        tags "rotating_light"
        icon "https://prometheus.io/assets/favicons/favicon-32x32.png"
      }
      severity "warning" {
        priority 3
        tags "warning"
        icon "https://prometheus.io/assets/favicons/favicon-32x32.png"
      }
    }

    resolved {
      tags "white_check_mark"
      icon "https://prometheus.io/assets/favicons/favicon-32x32.png"
    }

    ntfy {
      server https://ntfy.sh
      topic argus-alerts-F39BA353
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-alertmanager
  namespace: monitoring
  labels:
    app: ntfy-alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-alertmanager
  template:
    metadata:
      labels:
        app: ntfy-alertmanager
    spec:
      containers:
        - name: ntfy-alertmanager
          image: codeberg.org/xenrox/ntfy-alertmanager:latest
          args: ["--config", "/etc/ntfy-alertmanager/config"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy-alertmanager
      volumes:
        - name: config
          configMap:
            name: ntfy-alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-alertmanager
  namespace: monitoring
  labels:
    app: ntfy-alertmanager
spec:
  selector:
    app: ntfy-alertmanager
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# --- Alertmanager ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: ntfy
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: ntfy
          matchers:
            - severity="critical"
          repeat_interval: 1h
          continue: false

    receivers:
      - name: ntfy
        webhook_configs:
          - url: "http://ntfy-alertmanager:8080"
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: [alertname, namespace]
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=0.0.0.0:9093"
          ports:
            - name: web
              containerPort: 9093
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
