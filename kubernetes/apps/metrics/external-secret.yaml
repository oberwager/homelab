# 1Password item: "grafana-admin" (vault: Homelab)
#   Field: password → Grafana admin user password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: grafana-admin
        property: password
