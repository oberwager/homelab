global:
  resolve_timeout: 5m

route:
  receiver: ntfy
  group_by: [alertname, namespace]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: ntfy
      matchers:
        - severity="critical"
      repeat_interval: 1h
      continue: false

receivers:
  - name: ntfy
    webhook_configs:
      - url: "http://ntfy-alertmanager:8080"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, namespace]
