apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  cluster.yml: |
    groups:
      - name: node
        rules:
          - alert: NodeHighCpuUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 85% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)"

          - alert: NodeHighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is above 90% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)"

          - alert: NodeDiskPressure
            expr: (1 - node_filesystem_avail_bytes{mountpoint="/var"} / node_filesystem_size_bytes{mountpoint="/var"}) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk usage high on {{ $labels.instance }}"
              description: "/var filesystem usage above 85% (current: {{ $value | printf \"%.1f\" }}%)"

          - alert: NodeExporterDown
            expr: up{job="node-exporter"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node exporter is down"

      - name: kubernetes
        rules:
          # Only fire if 3+ restarts in 15 minutes - ignores single restart from deploy
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 2
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.container }} crash looping in {{ $labels.namespace }}"
              description: "{{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in 15m"

          # Exclude Job/CronJob pods - they're ephemeral and often Pending briefly
          - alert: PodNotReady
            expr: |
              kube_pod_status_phase{phase=~"Pending|Unknown"} == 1
              unless on(pod, namespace) kube_pod_owner{owner_kind="Job"}
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
              description: "Pod has been in {{ $labels.phase }} state for more than 15 minutes"

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_status_replicas_available != kube_deployment_spec_replicas
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
              description: "Expected {{ $value }} replicas but not all are available"

          # Tracks the CronJob itself, not individual jobs (which rotate out)
          - alert: CronJobFailed
            expr: |
              (time() - kube_cronjob_status_last_successful_time) > 600
              and kube_cronjob_status_last_successful_time > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} hasn't succeeded in 10+ minutes"

          - alert: CronJobNotScheduled
            expr: time() - kube_cronjob_next_schedule_time < -3600
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} missed schedule"

      - name: certificates
        rules:
          - alert: CertificateExpiringSoon
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 1209600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.exported_namespace }} expires in less than 14 days"

          - alert: CertificateNotReady
            expr: certmanager_certificate_ready_status{condition="False"} == 1
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.exported_namespace }} is not ready"

      - name: monitoring
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Scrape target {{ $labels.job }} on {{ $labels.instance }} is down"

          - alert: PrometheusTSDBCompactionsFailing
            expr: increase(prometheus_tsdb_compactions_failed_total[1h]) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus TSDB compaction failures"
