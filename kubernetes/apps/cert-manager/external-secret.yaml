# 1Password item: "cloudflare-api-token-secret" (vault: Homelab)
#   Field: api-token → the Cloudflare API token used by cert-manager for DNS-01 challenges
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token-secret
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-api-token-secret
        property: api-token
