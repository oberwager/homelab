clusterName: argus
endpoint: https://192.168.50.203:6443
kubernetesVersion: v1.32.0
talosVersion: v1.9.0
allowSchedulingOnMasters: true

nodes:
  - hostname: talos-3k8-fga
    ipAddress: 192.168.50.203
    installDisk: /dev/sda
    controlPlane: true

patches:
  - |-
    machine:
      kubelet:
        defaultRuntimeSeccompProfileEnabled: true
        disableManifestsDirectory: true
      kernel:
        modules:
          - name: tun
  - |-
    cluster:
      apiServer:
        auditPolicy:
          apiVersion: audit.k8s.io/v1
          kind: Policy
          rules:
            - level: Metadata
