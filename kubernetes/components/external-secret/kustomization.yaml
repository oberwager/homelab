apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Adds common boilerplate to all ExternalSecret resources in the including kustomization.
# Each app only needs to define: metadata.name, metadata.namespace, spec.target.name, spec.data.
patches:
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
    patch: |-
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: placeholder
      spec:
        refreshInterval: 1h
        secretStoreRef:
          kind: ClusterSecretStore
          name: onepassword
        target:
          creationPolicy: Owner
