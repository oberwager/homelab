# Manually create these two secrets before applying this file — do NOT commit them to git:
#
#   kubectl create secret generic op-credentials \
#     --namespace external-secrets \
#     --from-file=1password-credentials.json=/path/to/1password-credentials.json
#
#   kubectl create secret generic op-access-token \
#     --namespace external-secrets \
#     --from-literal=token=<your-connect-access-token>
#
# Generate both from https://start.1password.com → Integrations → 1Password Connect

apiVersion: v1
kind: PersistentVolume
metadata:
  name: onepassword-connect-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  hostPath:
    path: /var/lib/onepassword-connect
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onepassword-connect-data
  namespace: external-secrets
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onepassword-connect
  namespace: external-secrets
  labels:
    app: onepassword-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onepassword-connect
  template:
    metadata:
      labels:
        app: onepassword-connect
    spec:
      initContainers:
        - name: fix-data-dir-permissions
          image: alpine:3
          command: ['chown', '-R', '999:999', '/data']
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      volumes:
        - name: credentials
          secret:
            secretName: op-credentials
        - name: data
          persistentVolumeClaim:
            claimName: onepassword-connect-data
      containers:
        - name: connect-api
          image: 1password/connect-api:1.8
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: credentials
              mountPath: /home/opuser/.op/1password-credentials.json
              subPath: 1password-credentials.json
              readOnly: true
            - name: data
              mountPath: /home/opuser/.op/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: connect-sync
          image: 1password/connect-sync:1.8
          env:
            - name: OP_HTTP_PORT
              value: "8081"
          volumeMounts:
            - name: credentials
              mountPath: /home/opuser/.op/1password-credentials.json
              subPath: 1password-credentials.json
              readOnly: true
            - name: data
              mountPath: /home/opuser/.op/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  selector:
    app: onepassword-connect
  ports:
    - name: http
      port: 8080
      targetPort: 8080
