# 1Password item: "tailscale-auth" (vault: homelab-k8s)
#   Field: TS_AUTHKEY → Tailscale auth key (tskey-auth-...)
#   Note: Tailscale auth keys expire. When rotating, generate a new key in the
#   Tailscale admin console, update the 1Password field, then force-sync and
#   restart the tailscale pod.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: TS_AUTHKEY
      remoteRef:
        key: tailscale-auth
        property: TS_AUTHKEY
